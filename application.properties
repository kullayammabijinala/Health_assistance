spring.application.name=lifeline

# Database Connection URL (Make sure 'lifeline_db' exists in your XAMPP phpMyAdmin!)
spring.datasource.url=jdbc:mysql://localhost:3306/lifeline_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root

# Keep this completely blank if using default XAMPP MySQL
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Automatically creates or updates your database tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true